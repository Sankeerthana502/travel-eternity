<!DOCTYPE html>
<html>

<head>

    <title>Travel & Eternity</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>Travel & Eternity</h1>

<form action="/plan" method="POST">

    <input
        type="text"
        name="username"
        placeholder="Enter Username"
        required>

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required>

    <br><br>

    <input
        type="text"
        name="destination"
        placeholder="Destination"
        value="Yadadri"
        readonly>

    <br><br>

    <select name="interest">

        <option value="">Select Interest Area</option>

        <option>Temples</option>
        <option>Trekking</option>
        <option>Food</option>
        <option>Photography</option>

    </select>

    <br><br>

    <select name="travel_type">

        <option value="">Travel Type</option>

        <option>Solo</option>
        <option>Couple</option>
        <option>Family</option>
        <option>Friends</option>

    </select>

    <br><br>

    <input
        type="text"
        name="budget"
        placeholder="Enter Budget">

    <br><br>

    <input
        type="number"
        name="days"
        placeholder="Trip Duration (Days)"
        required>

    <br><br>

    <button type="submit">
        Generate Blueprint
    </button>

</form>

</body>
</html>
